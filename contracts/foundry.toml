[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./" }]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

[fuzz]
runs = 256

[rpc_endpoints]
base        = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base         = { key = "${BASESCAN_API_KEY}", chain = "base" }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = "base-sepolia" }
