# SPDX-License-Identifier: Apache-2.0
# Qwen3-32B full FT on 8x MI300X with FSDP2. ~5-9 hours per 1B tokens at FP8 with TE-CK.
# CRITICAL: 8 GPUs only — 2/4 GPU FSDP groups hit MI300X xGMI bandwidth asymmetry.
meta:
  project: mindxtrain_demo
  run_name: qwen3_32b_full_fsdp
  seed: 2048
  license: apache-2.0

hardware:
  name: mi300x
  gfx_arch: gfx942
  gpus: 8
  expected_hbm_gb: 192

autotune:
  enabled: true
  budget_seconds: 90
  policy: aot_only

model:
  name: Qwen/Qwen3-32B
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16

data:
  source: hf
  hf_id: HuggingFaceH4/ultrachat_200k
  split: train_sft
  seq_len: 4096
  packing: true

train:
  backend: primus
  method:
    kind: full
  optimizer:
    name: adamw_torch_fused
    lr: 3.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.1
    grad_clip: 1.0
  schedule:
    type: cosine
    warmup_ratio: 0.03
    epochs: 1
  batch:
    per_device: 2
    grad_accum: 4
  precision: bfloat16
  gradient_checkpointing: true
  flash_attention:
    backend: ck
  fsdp:
    enabled: true
    auto_wrap: true
  env:
    HSA_NO_SCRATCH_RECLAIM: "1"
    NVTE_CK_USES_BWD_V3: "1"
    NVTE_CK_IS_V3_ATOMIC_FP32: "1"
    PRIMUS_TURBO_ATTN_V3_ATOMIC_FP32: "1"
    NCCL_MIN_NCHANNELS: "112"
    HIP_FORCE_DEV_KERNARG: "1"
    PYTORCH_ROCM_ARCH: "gfx942"
    GPU_MAX_HW_QUEUES: "1"
