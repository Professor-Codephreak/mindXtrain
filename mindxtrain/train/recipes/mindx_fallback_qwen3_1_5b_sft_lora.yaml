# SPDX-License-Identifier: Apache-2.0
# mindX local-fallback recipe — Qwen3-1.5B LoRA on the dream-cycle corpus.
#
# The closed loop:
#   mindX's machine_dreaming agent emits per-agent JSONL training data on every
#   ~8h dream cycle. This recipe pulls that corpus directly off disk, runs a
#   LoRA on Qwen3-1.5B on a single MI300X (~3-5 GPU-hrs for one epoch over
#   ~2k examples), and publishes the result to HF Hub. The published model is
#   then registered with mindX as a local fallback for when frontier APIs are
#   unreachable.
#
# Burn estimate: ~$10-15 of the $100 AMD credit envelope. Smoke-test first with
# `mindx_fallback_qwen3_1_5b_cpu.yaml` to verify the pipeline closes locally.
meta:
  project: mindx_self_training
  run_name: mindx_fallback_qwen3_1_5b
  seed: 2048
  license: apache-2.0
  description: >-
    LoRA fine-tune of Qwen3-1.5B on mindX dream-cycle insights, intended as
    the local-fallback model when mindX cannot reach a frontier API.

hardware:
  name: mi300x
  gfx_arch: gfx942
  gpus: 1
  expected_hbm_gb: 192

autotune:
  enabled: true
  plan_path: ./out/mindxtrain.tuned.yaml
  budget_seconds: 60
  policy: aot_only

model:
  name: Qwen/Qwen3-1.5B
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16
  trust_remote_code: false

data:
  source: mindx_dreams
  path: /home/hacker/mindX/data/memory
  seq_len: 2048
  packing: true
  dedupe:
    minhash:
      threshold: 0.85
  shard:
    num_shards: 1

train:
  backend: axolotl
  method:
    kind: lora
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  optimizer:
    name: adamw_torch_fused
    lr: 1.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.1
    grad_clip: 1.0
  schedule:
    type: cosine
    warmup_ratio: 0.03
    epochs: 3
  batch:
    per_device: 8
    grad_accum: 4
  precision: bfloat16
  gradient_checkpointing: true
  flash_attention:
    backend: ck
  fsdp:
    enabled: false
  env:
    HSA_NO_SCRATCH_RECLAIM: "1"
    NVTE_CK_USES_BWD_V3: "1"
    NVTE_CK_IS_V3_ATOMIC_FP32: "1"
    PRIMUS_TURBO_ATTN_V3_ATOMIC_FP32: "1"
    NCCL_MIN_NCHANNELS: "112"
    HIP_FORCE_DEV_KERNARG: "1"
    PYTORCH_ROCM_ARCH: "gfx942"

eval:
  harness:
    tasks: [mmlu, gsm8k, ifeval]
    fewshot: 5
  regression:
    baseline: Qwen/Qwen3-1.5B
    threshold_pct: -2.0

quantize:
  enabled: true
  scheme: quark_fp8
  ptpc: true

serve:
  backend: vllm-rocm
  reasoning_parser: qwen3
  tool_call_parser: hermes
  tensor_parallel: 1
  max_model_len: 4096
  port: 8000

publish:
  enabled: true
  hf:
    repo: pythai/mindx-fallback-qwen3-1.5b
    private: false
  lighthouse:
    api_key_env: LIGHTHOUSE_API_KEY
  mindx:
    api_url: https://mindx.pythai.net/v1/agents
    register_as_capability: true
  agenticplace:
    api_url: https://agenticplace.pythai.net/v1/listings
    chain_map_url: https://agenticplace.pythai.net/allchain.html
  bankon:
    ens_parent: bankon.eth
    subname: mindx-fallback-qwen3-1.5b
  billing:
    x402:
      network: algorand
      asset: USDC
      receiver_via: parsec_wallet
      price_per_1k_tokens: 0.0002

receipt:
  output: ./out/receipt.json
  include:
    - rocm_version
    - gfx_arch
    - container_digest
    - all_git_shas
    - yaml_hash
    - dataset_cids
    - eval_report
    - energy_kwh
