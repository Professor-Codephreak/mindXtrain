# SPDX-License-Identifier: Apache-2.0
# Qwen3-32B GRPO on GSM8K. Mirrors AMD's published TRL+vLLM+DeepSpeed GRPO recipe.
meta:
  project: mindxtrain_demo
  run_name: qwen3_32b_grpo_gsm8k
  seed: 2048

hardware:
  name: mi300x
  gfx_arch: gfx942
  gpus: 8

autotune:
  enabled: true

model:
  name: Qwen/Qwen3-32B
  torch_dtype: bfloat16

data:
  source: hf
  hf_id: openai/gsm8k
  split: train
  seq_len: 2048

train:
  backend: axolotl
  method:
    kind: grpo
    num_generations: 4
    kl_coef: 0.04
  optimizer:
    name: adamw_torch_fused
    lr: 5.0e-7
  schedule:
    type: cosine
    warmup_ratio: 0.03
    epochs: 1
  batch:
    per_device: 1
    grad_accum: 8
  precision: bfloat16
  fsdp:
    enabled: true
