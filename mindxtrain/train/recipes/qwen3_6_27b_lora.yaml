# SPDX-License-Identifier: Apache-2.0
# Qwen3.6-27B (dense, released April 22 2026) LoRA on 8x MI300X.
# 262,144 native context, default-thinking with `chat_template_kwargs={"enable_thinking": False}`.
meta:
  project: mindxtrain_demo
  run_name: qwen3_6_27b_lora
  seed: 2048

hardware:
  name: mi300x
  gfx_arch: gfx942
  gpus: 8

autotune:
  enabled: true

model:
  name: Qwen/Qwen3.6-27B
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16

data:
  source: hf
  hf_id: HuggingFaceH4/ultrachat_200k
  split: train_sft
  seq_len: 8192
  packing: true

train:
  backend: axolotl
  method:
    kind: lora
    r: 32
    alpha: 64
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  optimizer:
    name: adamw_torch_fused
    lr: 1.0e-4
  schedule:
    type: cosine
    warmup_ratio: 0.03
    epochs: 2
  batch:
    per_device: 2
    grad_accum: 8
  precision: bfloat16
  gradient_checkpointing: true
  fsdp:
    enabled: true
