# SPDX-License-Identifier: Apache-2.0
# Qwen3-8B full SFT on a single MI300X (no LoRA). 192 GB HBM3 makes this trivially possible.
meta:
  project: mindxtrain_demo
  run_name: qwen3_8b_sft_full
  seed: 2048
  license: apache-2.0

hardware:
  name: mi300x
  gfx_arch: gfx942
  gpus: 1
  expected_hbm_gb: 192

autotune:
  enabled: true
  budget_seconds: 60
  policy: aot_only

model:
  name: Qwen/Qwen3-8B
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16

data:
  source: hf
  hf_id: HuggingFaceH4/ultrachat_200k
  split: train_sft
  seq_len: 4096
  packing: true

train:
  backend: axolotl
  method:
    kind: full
  optimizer:
    name: adamw_torch_fused
    lr: 5.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.1
    grad_clip: 1.0
  schedule:
    type: cosine
    warmup_ratio: 0.03
    epochs: 1
  batch:
    per_device: 4
    grad_accum: 8
  precision: bfloat16
  gradient_checkpointing: true
  flash_attention:
    backend: ck
  fsdp:
    enabled: false

eval:
  harness:
    tasks: [mmlu, gsm8k, ifeval, humaneval]
    fewshot: 5
  regression:
    baseline: Qwen/Qwen3-8B
    threshold_pct: -1.0

quantize:
  enabled: true
  scheme: quark_fp8
  ptpc: true

serve:
  backend: vllm-rocm
  reasoning_parser: qwen3
  tool_call_parser: hermes
