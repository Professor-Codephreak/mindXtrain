name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  lint-type-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.18"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync workspace
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy (config + custmodel)
        run: uv run mypy mindXtrain/xtrain/config custmodel
      - name: Pytest
        run: uv run pytest -q
